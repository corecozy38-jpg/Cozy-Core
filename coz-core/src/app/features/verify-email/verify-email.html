<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-6 sm:p-8 transition-all text-center">

    <div class="mb-6 flex justify-center">
      <div class="bg-gray-800 p-2 rounded-full shadow-md">
        <img src="logo.png" alt="Logo" class="h-10 sm:h-12" />
      </div>
    </div>

    @if (loading) {
    <div class="py-8">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-gray-300 border-t-gray-900"></div>
      <p class="mt-4 text-gray-600 text-sm">{{ 'auth.verifying' | translate }}</p>
    </div>
    }

    @if (message) {
    <div class="py-6">
      <div class="mx-auto w-12 h-12 flex items-center justify-center rounded-full mb-4" [class.bg-green-100]="isSuccess"
        [class.bg-red-100]="!isSuccess">
        @if (isSuccess) {
        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        } @else {
        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
        }
      </div>
      <p class="text-base sm:text-lg font-medium" [class.text-green-700]="isSuccess" [class.text-red-700]="!isSuccess">
        {{ message | translate }}
      </p>
    </div>
    }

    @if (!loading && isSuccess) {
    <button (click)="goToLogin()"
      class="mt-4 w-full bg-gray-900 text-white py-2.5 rounded-full font-semibold hover:bg-gray-800 transition active:scale-95">
      {{ 'auth.back_to_login' | translate }}
    </button>
    }

    @if (!loading && !isSuccess && message) {
    <button (click)="goToLogin()"
      class="mt-4 w-full bg-gray-600 text-white py-2.5 rounded-full font-semibold hover:bg-gray-700 transition">
      {{ 'auth.back_to_login' | translate }}
    </button>
    }
  </div>
</div>
