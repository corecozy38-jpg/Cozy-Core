@if(isVisible){
  <button
      (click)="scrollToTop()"
      class="fixed bottom-6 right-6 z-50 p-3 rounded-full shadow-lg transition-all duration-300 hover:scale-110 focus:outline-none
      bg-gray-800 text-white hover:bg-gray-700 btn-scroll-top"
      aria-label="Scroll to top"
      [class.right-6]="!isRtl"
      [class.left-6]="isRtl"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
      </svg>
    </button>
}
